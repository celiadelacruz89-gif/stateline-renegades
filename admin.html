<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Renegades Admin</title>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:40px;
}

.login{
max-width:400px;
margin:auto;
background:#222;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
padding:10px 20px;
background:red;
color:white;
border:none;
cursor:pointer;
}

.hidden{
display:none;
}
</style>

</head>
<body>

<div class="login" id="loginBox">

<h2>Admin Login</h2>

<input id="user" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>


<div id="adminPanel" class="hidden">

<h2>Gallery Upload</h2>

<input type="file">

<br><br>

<button>Upload Photo</button>

<p>(Upload feature ready for backend later)</p>

</div>


<script>

function login(){

const u = document.getElementById("user").value;
const p = document.getElementById("pass").value;

if(u==="admin" && p==="renegades"){

document.getElementById("loginBox").style.display="none";

document.getElementById("adminPanel").style.display="block";

}
else{

alert("Wrong password");

}

}

</script>

</body>
</html>
